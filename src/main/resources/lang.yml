prefix: "<#00aaff><bold>DIRECTIONS</bold> <dark_grey>»</dark_grey> "

command:
  reloaded: "<prefix><green>Directions config reloaded."
  stopped: "<prefix><green>Directions navigation stopped."
  started-header: "<prefix><white>Here is how to get to <green><destination></green>!"
  started-navigation: "<prefix><white>Navigation started to <green><destination></green>."
  usage: "<prefix><red>Usage: /directions <region> | /directions stop | /directions reload"
  only-player: "<prefix><red>Only players can run this command."
  no-permission: "<prefix><red>You do not have permission."

gps:
  started: "<prefix><white>GPS set to <green><destination></green>. Follow the arrow."
  stopped: "<prefix><green>GPS stopped."
  usage: "<prefix><red>Usage: /gps <region> | /gps stop"

compass:
  started: "<prefix><white>Compass set to <green><destination></green>. Follow the arrow."
  stopped: "<prefix><green>Compass stopped."
  usage: "<prefix><red>Usage: /compass <x> <z> | /compass <x> <y> <z> | /compass transit <x> <z> | /compass transit <x> <y> <z> | /compass stop"

errors:
  region-manager-unavailable: "<prefix><red>WorldGuard region manager is unavailable for this world."
  region-not-found: "<prefix><red><region> is not a valid destination in this world."
  already-in-region: "<prefix><green>You are already in <region>."
  destination-unavailable: "<prefix><red>Destination parent/target region is unavailable."
  no-stops-in-world: "<prefix><red>No stops are available in this world."
  no-destination-stop: "<prefix><red>No destination-side stop found in this world."
  no-route: "<prefix><red>No route found to <region>."
  invalid-coordinates: "<prefix><red>Invalid coordinates."
  already-at-coordinates: "<prefix><green>You are already at <destination>."

directions:
  direct-walk: "<white>  <step>. Walk directly to <green><destination></green> <grey>(<distance> blocks <direction>)</grey>."
  walk-to-stop: "<white>  <step>. Walk to <to> <grey>(<hint>)</grey>."
  take-line: "<white>  <step>. Take <line> from <from> to <to>."
  walk-between-stops: "<white>  <step>. Walk from <from> to <to>."
  walk-to-destination: "<white>  <step>. Walk to <destination> from <from>."
  warn-start-fallback: "<yellow>  ⚠ No nearby starting stop found; using nearest stop."
  warn-destination-fallback: "<yellow>  ⚠ Destination has no nearby stop; using nearest stop."
  switch-to-direct: "<gray>  Prefer a direct arrow? <click:run_command:'<command>'><aqua>Switch to GPS</aqua></click> <dark_gray>(<command>)</dark_gray>"

navigation:
  next-stop: "<prefix><white>Next stop: <stop>"
  next-stop-with-line: "<prefix><white>Next stop: <stop> <gray>(<line>)</gray>"
  upcoming-next-stop: "<prefix><white>Get ready. Next stop to catch: <stop>"
  upcoming-next-stop-with-line: "<prefix><white>Get ready. Next stop to catch: <stop> <gray>(<line>)</gray>"
  next-destination: "<prefix><white>Now walk to <stop>."
  upcoming-destination: "<prefix><white>Get ready to walk to <stop>."
  arrived: "<prefix><green>You have arrived at <destination>."
